<head>
    <title>FORMULÁRIO</title>
</head>

<body>

    <h2>Conceitos sobre Formulário no HTML</h2>
    <p>Esta página possui um resumo sobre os conceitos de formulários do HTML!</p>

    <h2>Formulário</h2>

    <form>
        <div>
            <label for="nome">Nome: </label>
            <input type="text">
        </div>

        <br>

        <div>
            <label for="idade">Idade</label>
            <input type="number" min="0" max="120">
        </div>

        <br>

        <div>
            <label for="usuario">Usuário: </label>
            <input type="text">
        </div>

        <br>

        <div>
            <label for="senha">Senha: </label>
            <input type="password">
        </div>

        <br>

        <div>
            <label for="dataEvento">Data do Evento: </label>
            <input type="datetime-local">
        </div>
        <br>

        <div>
            <label for="">
                Telefone:
                <input type="tel" required placeholder="(xx)xxxxx-xxxx">
            </label>
        </div>
        <br>

        <div>
            <label for="email">
                E-mail: <input type="email" required>
            </label>
        </div>
        <br>

        <div>
            <label for="peso">
                Peso: <input type="number" min="0" max="200" step="0.5">
            </label>
        </div>
        <br>

        <div>
            <label for="volume">
                Volume:<input type="range" min="0" max="100" step="5">
            </label>
        </div>
        <br>

        <div>
            <fieldset>
                <legend>Estado Civil</legend>
                <p>
                    <label for="est_civil">
                        <input type="radio" name="est_civil" value="casado"> Casado
                    </label>
                </p>
                <p>
                    <label for="est_civil">
                        <input type="radio" name="est_civil" value="solteiro"> Solteiro
                    </label>
                </p>
                <p>
                    <label for="est_civil">
                        <input type="radio" name="est_civil" value="divorciado"> Divorciado
                    </label>
                </p>
            </fieldset>
        </div>
        <br>

        <div>
            <fieldset>
                <legend>Produtos</legend>
                <p>
                    <label>
                        <input type="checkbox" name="computador" value="computador"> Computador
                    </label>
                </p>
                <p>
                    <label>
                        <input type="checkbox" name="impressora" value="impressora"> Impressora
                    </label>
                </p>
                <p>
                    <label>
                        <input type="checkbox" name="monitor" value="monitor"> Monitor
                    </label>
                </p>
            </fieldset>
        </div>
        <br>

        <div>
            <label>
                Deixe sua sugestão:
                <textarea cols="30" rows="5"></textarea> 
            </label>
        </div>

        <div>
            <p>
                <label>
                    Site: <input type="url" list = "sites" name="link">
                </label>
            </p>

            <datalist id = "sites">
                <option label="Youtube" value ="https://www.youtube.com/"></option>
                
                <option label="TikTok" value ="https://www.tiktok.com/"></option>
                
                <option label="Twitter" value ="https://x.com/?lang=pt"></option>
            </datalist>
        </div>  

        <button type="submit">Enviar</button>
    </form>
</body>

</html>
